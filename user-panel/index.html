    <script>
      window.__tdzErrors = [];
      window.addEventListener('unhandledrejection', function(e) {
        var err = e.reason;
        var info = {
          message: err && err.message ? err.message : String(err),
          stack: err && err.stack ? err.stack.slice(0, 2000) : 'no stack'
        };
        window.__tdzErrors.push(info);
        try {
          sessionStorage.setItem('__tdzError', JSON.stringify(info));
          sessionStorage.setItem('__nefol_crash', (info.message + '\n' + info.stack).trim());
        } catch(ex) {}
      });
      window.addEventListener('error', function(e) {
        var info = {
          message: e.message,
          filename: e.filename,
          line: e.lineno,
          col: e.colno
        };
        try {
          sessionStorage.setItem('__jsError', JSON.stringify(info));
        } catch(ex) {}
      });
    </script>

    <div id="root"></div>
    <div id="boot-watchdog" style="display:none; position:fixed; inset:0; z-index:999999; background:#F4F9F9; padding:16px; font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;">
      <div style="max-width:720px; margin:48px auto; background:#fff; border:1px solid #e5e7eb; border-radius:16px; padding:16px;">
        <div style="font-size:14px; font-weight:700; color:#0f172a;">NEFOL didn’t finish loading on this browser.</div>
        <div style="margin-top:6px; font-size:12px; color:#475569;">
          This usually happens due to a Safari-specific crash or a cached Service Worker build mismatch.
        </div>
        <pre id="boot-watchdog-details" style="margin-top:12px; white-space:pre-wrap; word-break:break-word; font-size:11px; background:#f8fafc; border:1px solid #e2e8f0; border-radius:12px; padding:12px; color:#0f172a;"></pre>
        <div style="margin-top:12px; display:flex; gap:10px; flex-wrap:wrap;">
          <button onclick="location.reload()" style="background:#1B4965; color:#fff; border:0; border-radius:12px; padding:10px 14px; font-weight:700;">Reload</button>
          <button onclick="try{navigator.serviceWorker.getRegistrations().then(function(rs){return Promise.all(rs.map(function(r){return r.unregister()}))}).then(function(){location.reload()})}catch(e){location.reload()}" style="background:#0f172a; color:#fff; border:0; border-radius:12px; padding:10px 14px; font-weight:700;">Clear SW + Reload</button>
        </div>
      </div>
    </div>

    <script src="/boot-watchdog.js"></script>
    <script>
      (function () {
        var tdzErr = null;
        var jsErr = null;
        try {
          tdzErr = sessionStorage.getItem('__tdzError');
          jsErr = sessionStorage.getItem('__jsError');
        } catch (ex) {}
        if (!tdzErr && !jsErr) return;
        var box = document.getElementById('boot-watchdog');
        var mount = box ? box.querySelector('div') : null;
        if (!mount) return;
        var pre = document.createElement('pre');
        pre.setAttribute('data-tdz-panel', '1');
        pre.style.cssText =
          'background:#fee;padding:8px;font-size:10px;overflow:auto;max-height:200px;margin-top:8px;white-space:pre-wrap;word-break:break-word;';
        pre.textContent = 'TDZ: ' + (tdzErr || 'none') + '\nJS: ' + (jsErr || 'none');
        var details = document.getElementById('boot-watchdog-details');
        if (details && details.parentNode) {
          details.parentNode.insertBefore(pre, details.nextSibling);
        } else {
          mount.appendChild(pre);
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
